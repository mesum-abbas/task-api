services:

  db:

    image: postgres:17

    container_name: postgres-db

    restart: always

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

      POSTGRES_DB: taskdb

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  app:

    build: .

    container_name: task-api

    restart: always

    ports:

      - "3000:3000"

    env_file:

      - .env

    depends_on:

      - db

volumes:

  postgres_data: